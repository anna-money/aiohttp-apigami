name: PR review (pi)

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    uses: anna-money/shared-actions/.github/workflows/pr-review.yml@main
    with:
      min-changed-lines: "1"
    secrets: inherit
